services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myatelier_pro}
      POSTGRES_USER: ${POSTGRES_USER:-beauty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beauty} -d ${POSTGRES_DB:-myatelier_pro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-beauty}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-myatelier_pro}
      BACKUP_STORAGE_DIR: /app/storage/backups
      ATTACHMENT_STORAGE_DIR: /app/storage/attachments
    volumes:
      - ../storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    restart: unless-stopped
    command: ["npm", "run", "preview", "--", "--host", "0.0.0.0", "--port", "4173"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/myatelier.conf.example:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
